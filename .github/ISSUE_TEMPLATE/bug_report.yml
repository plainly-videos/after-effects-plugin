name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can — it helps us reproduce and fix the issue faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what the bug is.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open After Effects and launch the Plainly plugin
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Found in the plugin footer or the Adobe Exchange listing.
      placeholder: e.g. 1.3.1
    validations:
      required: true

  - type: input
    id: ae-version
    attributes:
      label: After Effects version
      description: Help > About After Effects
      placeholder: e.g. 25.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. macOS 15.3 / Windows 11

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install the plugin?
      options:
        - Adobe Exchange
        - Manual install (.zxp)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs or error messages
      description: Open the plugin's developer console (right-click > Inspect) and paste any errors here.
      render: plain text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: If applicable, attach screenshots or a short recording to help explain the problem.

  - type: textarea
    id: project-info
    attributes:
      label: After Effects project details
      description: |
        Details about the project you were working with when the bug occurred. If you can share the project file, please attach it (zip it first if needed) — it's often the fastest way for us to reproduce the issue.
      placeholder: |
        - Project size (approx. file size or number of compositions)
        - Number and types of assets (footage, images, fonts, etc.)
        - Any linked files or missing assets?
        - Were you using team projects / shared storage?
        - Anything unusual about the project structure?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant?
