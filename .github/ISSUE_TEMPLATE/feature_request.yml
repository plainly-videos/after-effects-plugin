name: Feature Request
description: Suggest an idea or improvement for the plugin
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Please describe what you're trying to accomplish and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain point or limitation you're running into.
      placeholder: I'm always having to... / It's frustrating when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're using today, or other approaches you thought of?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or anything else that helps illustrate the idea.
